<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>親子覺察對話手冊｜永齡希望小學雲科大分校</title>
<meta name="description" content="五個時間點 × 50 個問題 × 接話建議，讓日常聊天成為素養教育。永齡希望小學雲科大分校 SEL 課程資源。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --s1: #E8F4F0; --s1a: #2D7D62; --s1b: #1a5c47;
    --s2: #EEF2FB; --s2a: #3D5FA3; --s2b: #2a4480;
    --s3: #FEF6EE; --s3a: #C06A1A; --s3b: #8f4e12;
    --s4: #F2EEF8; --s4a: #7A4DB0; --s4b: #5a3585;
    --s5: #F0F0F8; --s5a: #3A4A8A; --s5b: #28366a;
    --warn: #FEF9EE; --warna: #B07A1A;
    --bg: #FAFAF8;
    --bg2: #F5F4F0;
    --border: rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.14);
    --text: #1A1A18;
    --text2: #5A5A55;
    --text3: #9A9990;
    --white: #FFFFFF;
    --r: 12px;
    --serif: 'Noto Serif TC', 'Georgia', serif;
    --sans: 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    --shadow: 0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ── */
  .site-header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 1.6rem 2rem 1.4rem;
    position: sticky;
    top: 0;
    z-index: 50;
    box-shadow: 0 1px 8px rgba(0,0,0,0.05);
  }
  .hd-school {
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.08em;
    margin-bottom: 5px;
  }
  .hd-title {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.03em;
    color: var(--text);
    margin-bottom: 3px;
  }
  .hd-sub {
    font-size: 12px;
    color: var(--text2);
    line-height: 1.6;
  }

  /* ── TIPS BAR ── */
  .tips-bar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 2rem;
    display: flex;
    align-items: center;
    gap: 10px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .tips-bar::-webkit-scrollbar { display: none; }
  .tips-label {
    font-size: 11px;
    color: var(--text3);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .tip-pill {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 13px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: var(--white);
    font-size: 11px;
    font-family: var(--sans);
    white-space: nowrap;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
    color: var(--text);
  }
  .tip-pill:hover { background: var(--bg2); border-color: var(--border2); }
  .tip-icon { font-size: 14px; }

  /* ── NAV ── */
  .scenario-nav {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0.9rem 2rem;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .scenario-nav::-webkit-scrollbar { display: none; }
  .nav-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 7px 15px;
    border-radius: var(--r);
    border: 1px solid var(--border);
    background: var(--white);
    font-size: 12px;
    font-family: var(--sans);
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: all 0.18s;
    color: var(--text2);
  }
  .nav-btn:hover { border-color: var(--border2); color: var(--text); }
  .nav-btn.active { border-width: 1.5px; font-weight: 500; }
  .nav-btn.n1.active { background: var(--s1); border-color: var(--s1a); color: var(--s1b); }
  .nav-btn.n2.active { background: var(--s2); border-color: var(--s2a); color: var(--s2b); }
  .nav-btn.n3.active { background: var(--s3); border-color: var(--s3a); color: var(--s3b); }
  .nav-btn.n4.active { background: var(--s4); border-color: var(--s4a); color: var(--s4b); }
  .nav-btn.n5.active { background: var(--s5); border-color: var(--s5a); color: var(--s5b); }

  /* ── MAIN ── */
  .main-content {
    max-width: 1100px;
    margin: 0 auto;
    padding: 1.8rem 2rem 4rem;
  }

  /* ── SCENARIO HEADER ── */
  .sh-wrap { margin-bottom: 1.6rem; }

  .sh-card {
    padding: 1.1rem 1.4rem;
    border-radius: var(--r);
    border-left: 3px solid;
    cursor: pointer;
    user-select: none;
    transition: opacity 0.15s;
  }
  .sh-card:hover { opacity: 0.92; }
  .sh-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .sh-card h2 { font-family: var(--serif); font-size: 17px; font-weight: 600; margin-bottom: 3px; }
  .sh-card .core { font-size: 12px; line-height: 1.6; }

  .sh1 { background: var(--s1); border-color: var(--s1a); }
  .sh1 h2 { color: var(--s1b); } .sh1 .core { color: var(--s1a); }
  .sh2 { background: var(--s2); border-color: var(--s2a); }
  .sh2 h2 { color: var(--s2b); } .sh2 .core { color: var(--s2a); }
  .sh3 { background: var(--s3); border-color: var(--s3a); }
  .sh3 h2 { color: var(--s3b); } .sh3 .core { color: var(--s3a); }
  .sh4 { background: var(--s4); border-color: var(--s4a); }
  .sh4 h2 { color: var(--s4b); } .sh4 .core { color: var(--s4a); }
  .sh5 { background: var(--s5); border-color: var(--s5a); }
  .sh5 h2 { color: var(--s5b); } .sh5 .core { color: var(--s5a); }

  .enc-btn {
    font-size: 11px;
    font-weight: 500;
    padding: 4px 11px;
    border-radius: 20px;
    border: 1px solid;
    white-space: nowrap;
    flex-shrink: 0;
    cursor: pointer;
    background: transparent;
    transition: all 0.15s;
    font-family: var(--sans);
  }
  .sh1 .enc-btn { border-color: var(--s1a); color: var(--s1a); }
  .sh2 .enc-btn { border-color: var(--s2a); color: var(--s2a); }
  .sh3 .enc-btn { border-color: var(--s3a); color: var(--s3a); }
  .sh4 .enc-btn { border-color: var(--s4a); color: var(--s4a); }
  .sh5 .enc-btn { border-color: var(--s5a); color: var(--s5a); }
  .enc-btn:hover { opacity: 0.75; }

  /* ── ENCYCLOPEDIA ── */
  .encyclopedia {
    display: none;
    margin-top: 10px;
    padding: 1.1rem 1.3rem;
    border-radius: var(--r);
    border: 1px solid var(--border);
    background: var(--white);
    animation: fadeIn 0.2s ease;
  }
  .encyclopedia.open { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

  .enc-intro {
    font-size: 12.5px;
    color: var(--text2);
    line-height: 1.75;
    margin-bottom: 12px;
    font-style: italic;
  }
  .enc-item { display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-start; }
  .enc-dot { width: 3px; border-radius: 2px; flex-shrink: 0; margin-top: 3px; align-self: stretch; min-height: 14px; }
  .enc-body { flex: 1; }
  .enc-title { font-size: 12.5px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
  .enc-text { font-size: 12px; color: var(--text2); line-height: 1.7; }

  /* ── CARD GRID ── */
  .questions-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 14px;
  }

  /* ── FLIP CARD ── */
  .card-wrapper {
    perspective: 900px;
    height: 216px;
    cursor: pointer;
  }
  .card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.42s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .card-wrapper.flipped .card-inner { transform: rotateY(180deg); }

  .card-front, .card-back {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: var(--r);
    border: 1px solid var(--border);
    padding: 1rem 1.2rem;
    display: flex;
    flex-direction: column;
    box-shadow: var(--shadow);
  }
  .card-back {
    transform: rotateY(180deg);
    background: var(--white);
    overflow: hidden;
  }
  .card-back-scroll {
    overflow-y: auto;
    flex: 1;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }
  .card-back-scroll::-webkit-scrollbar { width: 4px; }
  .card-back-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .card-front {
    background: var(--white);
    justify-content: space-between;
  }
  .card-front:hover { border-color: var(--border2); }

  .card-q-num {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }
  .card-q-text {
    font-family: var(--serif);
    font-size: 13.5px;
    line-height: 1.7;
    flex: 1;
    color: var(--text);
  }
  .card-hint {
    font-size: 10px;
    color: var(--text3);
    margin-top: 10px;
    text-align: right;
  }

  .c1 .card-q-num { color: var(--s1a); }
  .c2 .card-q-num { color: var(--s2a); }
  .c3 .card-q-num { color: var(--s3a); }
  .c4 .card-q-num { color: var(--s4a); }
  .c5 .card-q-num { color: var(--s5a); }

  .c1 .card-front { border-top: 2.5px solid var(--s1a); }
  .c2 .card-front { border-top: 2.5px solid var(--s2a); }
  .c3 .card-front { border-top: 2.5px solid var(--s3a); }
  .c4 .card-front { border-top: 2.5px solid var(--s4a); }
  .c5 .card-front { border-top: 2.5px solid var(--s5a); }

  /* ── CARD BACK ── */
  .back-top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .back-q-num { font-size: 10px; font-weight: 500; color: var(--text3); letter-spacing: 0.08em; }
  .back-close { font-size: 10px; color: var(--text3); }

  .answer-block { margin-bottom: 10px; }
  .answer-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 3px;
    display: flex;
    align-items: flex-start;
    gap: 5px;
    line-height: 1.4;
  }
  .answer-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    margin-top: 4px;
    flex-shrink: 0;
  }
  .d1 { background: var(--s1a); }
  .d2 { background: var(--s2a); }
  .d3 { background: var(--s3a); }
  .d4 { background: var(--s4a); }
  .d5 { background: var(--s5a); }

  .answer-response {
    font-family: var(--serif);
    font-size: 12.5px;
    line-height: 1.65;
    color: var(--text);
    background: var(--bg2);
    border-radius: 6px;
    padding: 6px 10px;
    margin-bottom: 3px;
  }
  .answer-why {
    font-size: 11px;
    color: var(--text2);
    line-height: 1.55;
    padding: 0 2px;
  }
  .avoid-block {
    margin-top: 10px;
    padding: 7px 10px;
    border-radius: 6px;
    background: var(--warn);
    border-left: 2px solid var(--warna);
  }
  .avoid-label {
    font-size: 10px;
    font-weight: 500;
    color: var(--warna);
    margin-bottom: 2px;
  }
  .avoid-text { font-size: 11px; color: #7D5010; line-height: 1.55; }

  /* ── TIP MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.3);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: var(--white);
    border-radius: var(--r);
    border: 1px solid var(--border);
    padding: 1.6rem;
    max-width: 340px;
    width: 100%;
    position: relative;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    animation: fadeIn 0.18s ease;
  }
  .modal-close {
    position: absolute;
    top: 12px; right: 14px;
    font-size: 20px;
    cursor: pointer;
    color: var(--text3);
    background: none;
    border: none;
    line-height: 1;
    font-family: var(--sans);
  }
  .modal-close:hover { color: var(--text); }
  .modal-icon { font-size: 24px; margin-bottom: 8px; }
  .modal-title { font-family: var(--serif); font-size: 16px; font-weight: 600; margin-bottom: 8px; color: var(--text); }
  .modal-body { font-size: 13px; line-height: 1.75; color: var(--text2); }

  /* ── FOOTER ── */
  .site-footer {
    padding: 1.5rem 2rem;
    border-top: 1px solid var(--border);
    text-align: center;
    background: var(--white);
  }
  .footer-school { font-size: 12px; color: var(--text3); letter-spacing: 0.05em; }
  .footer-copy { font-size: 11px; color: var(--text3); margin-top: 3px; }

  /* ── RESPONSIVE ── */
  @media (max-width: 640px) {
    .site-header { padding: 1.2rem 1.2rem 1rem; }
    .tips-bar { padding: 0.65rem 1.2rem; }
    .scenario-nav { padding: 0.75rem 1.2rem; }
    .main-content { padding: 1.2rem 1.2rem 3rem; }
    .questions-grid { grid-template-columns: 1fr; }
    .hd-title { font-size: 19px; }
  }

  @media (max-width: 480px) {
    .card-wrapper { height: 230px; }
  }
</style>
</head>

<!-- HEADER -->
<header class="site-header">
  <div class="hd-school">永齡希望小學雲科大分校　社會情緒學習課程</div>

<div class="tips-bar">
  <span class="tips-label">三個心法：</span>
  <button class="tip-pill" onclick="openTip(0)"><span class="tip-icon">🤐</span> 傾聽的藝術</button>
  <button class="tip-pill" onclick="openTip(1)"><span class="tip-icon">🪞</span> 鏡像反應</button>

<footer class="site-footer">
  <div class="footer-school">永齡希望小學雲科大分校</div>

<!-- TIP MODAL -->
<div class="modal-overlay" id="tipModal" onclick="if(event.target===this)closeTip()">
  <div class="modal-box" role="dialog" aria-modal="true">

<script>
// ── DATA ──────────────────────────────────────────────────

const TIPS = [
  { icon: '🤐', title: '傾聽的藝術', body: '孩子回答時，家長練習多聽 5 秒鐘，不要急著說「很好」或「不對」。給孩子繼續說話的空間，是最好的傾聽。' },
  { icon: '🪞', title: '鏡像反應', body: '當孩子說「心裡怪怪的」，家長只要重複「喔，所以那時候你覺得心裡怪怪的啊……」，孩子通常會自動說出更多。' },
  { icon: '🚪', title: '接受句點', body: '如果孩子說「我不知道」，家長可以溫柔地說：「沒關係，可能大腦還在休息，等你想到的時候再跟我說。」' },
];

const SCENARIOS = [
  {
    id: 1, emoji: '🎒', label: '放學接送', sub: '覺察社交與能量',
    navClass: 'n1', shClass: 'sh1', dotClass: 'd1', cardClass: 'c1',
    accentColor: '#2D7D62',
    core: '讓孩子分享與發現自己跟環境互動時的感受。',
    enc: {
      intro: '孩子放學後，其實不只是身體累，更多是「心裡用力了一整天」。這組提問的重點，是幫孩子從忙碌的一天中慢慢回到自己。',
      items: [
        { title: '看見能量狀態', body: '問「還有沒有電」，是在幫孩子學會感覺自己的狀態。他會慢慢學習到：什麼時候需要休息、什麼時候還有力氣。' },
        { title: '把感覺說清楚', body: '當孩子能說出「累在哪裡、卡在哪裡」，壓力不只是模糊的狀態，而是可以被理解的訊息。' },
        { title: '找回自己', body: '問「什麼時候最像自己」，是在幫孩子看見：什麼時候是自在的，什麼時候是在配合別人。' },
      ]
    },
    questions: [
      { q: '今天在學校的時候，有沒有哪個時候覺得精神很好？哪個時候又覺得很累？', answers: [ { label: '孩子說「有！上體育課的時候精神最好。」', resp: '「體育課啊——是因為一直在動所以有精神，還是那堂課特別好玩？」', why: '區分「身體能量」和「心理投入」，幫孩子更準確地認識自己的能量來源。' }, { label: '孩子說「都還好」「沒什麼差別」', resp: '「那你現在上車之後，感覺是還有電，還是快沒電了？」', why: '把問題拉回「當下」，孩子比較容易回答當下的感受，不需要回想一整天。' }, { label: '孩子說「都很累」', resp: '「從什麼時候開始覺得累的？還是一直都很累？」', why: '不急著安慰，先幫孩子定位「累從哪裡開始」，這其實就是在練習覺察自己的狀態。' } ], avoid: '「那你晚上早點睡喔。」——還沒說完就跳到解決方案，孩子會覺得你沒有真的想要理解他。' },
      { q: '我剛剛看到你上車的時候，好像有點悶悶的，是在想什麼嗎？', answers: [ { label: '孩子說「有，就是⋯⋯」', resp: '（先安靜聽，點頭，偶爾回「嗯」、「喔」）', why: '這可能是孩子今天最想說的一件事。最重要的不是解決問題，是「聽完」孩子想說的事。' }, { label: '孩子說「沒有啊～」', resp: '「好，那可能是有點累了。要不要聽個音樂，還是我們安靜一下？」', why: '不需要追問，給孩子一個「不用說話也可以」的空間，放鬆之後孩子反而會自己開口。' }, { label: '孩子沉默、看窗外', resp: '（先不要說話，讓車內安靜一下。）', why: '沉默不代表拒絕，很多時候只是孩子在整理情緒、慢慢放鬆。家長能給的，是一個「不用急著回應」的空間。' } ], avoid: '「你臉色很難看，是不是跟誰吵架了？」——這種說法很容易變成「幫孩子下判斷」，孩子反而會開始防備、否認。' },
      { q: '今天跟朋友玩的時候，有沒有哪一刻覺得有點怪怪的？', answers: [ { label: '孩子說「有，就是他們一直⋯⋯」', resp: '「那你那時候怎麼做？」', why: '先了解孩子「當下怎麼做」，不要急著問對不對。很多時候，孩子在說的過程中，就會自己開始想：「這樣做好嗎？」' }, { label: '孩子說「沒有，都很正常」', resp: '「那今天玩得開心嗎？跟誰一起玩？」', why: '從「開不開心」比直接問對錯更讓孩子覺得輕鬆，也比較容易讓孩子願意多說一點。' }, { label: '孩子說「有，但我不想說」', resp: '「好，不用說沒關係。那件事現在還在你心裡嗎？還是已經過了？」', why: '不需要追問細節，先關心孩子「當下的感覺」，讓孩子知道你有注意到他，但不會逼他說。' } ], avoid: '「那你應該要跟他說⋯⋯」「你怎麼不⋯⋯」——孩子還在說的時候就被打斷、被指導，下次他很可能就不想再分享了。' },
      { q: '老師上課的時候，你的腦袋是跟著在想，還是會不小心飄走了？', answers: [ { label: '孩子說「飄走了」（通常會笑）', resp: '「飄去哪了？」', why: '用輕鬆的語氣，讓孩子知道「分心是可以說的」。當孩子願意講，其實就在練習覺察自己的注意力。' }, { label: '孩子說「有在聽啊」', resp: '「那今天哪一堂課，你覺得最容易聽進去？」', why: '不是確認「有沒有在聽」，而是幫孩子發現什麼樣的課，自己比較容易專心。' }, { label: '孩子說「看哪堂課」', resp: '「那哪一堂最容易飄走？（可以帶點笑意問）」', why: '用一點幽默感，孩子通常會比較誠實，而這份誠實本身就是很好的自我覺察。' } ], avoid: '「所以你上課都沒在聽？那怎麼可以！」——一旦變成責備，孩子之後多半只會回答「有在聽」，反而失去真正了解孩子的機會。' },
      { q: '今天有沒有人說了什麼話，讓你心裡覺得暖暖的？或是有沒有哪句話，聽了之後感覺有點怪怪的？', answers: [ { label: '孩子說了讓他覺得溫暖的話', resp: '「你聽到那句話的時候，有沒有跟他說什麼？」', why: '從「被關心的感覺」延伸到「怎麼回應別人的善意」，讓孩子慢慢學會表達善意、回應善意。' }, { label: '孩子說了讓他不舒服的話', resp: '「是喔，那你聽到的時候，心裡是什麼感覺？」', why: '先關心孩子的感受，而不是急著評論對方對不對，讓孩子把情緒說清楚。' }, { label: '孩子說「沒有，都還好」', resp: '「那今天有沒有你說了什麼，讓別人好像很開心？」', why: '從「別人對你」換成「你對別人」，讓孩子練習覺察自己對他人的影響力。' } ], avoid: '「他說這種話很過分，你要去告訴老師。」——孩子還在說自己的感受時，家長就跳到行動方案，孩子會覺得自己的感受不重要。' },
      { q: '今天在學校，有沒有哪一件事，是你自己覺得做得還不錯的？', answers: [ { label: '孩子說了某件事', resp: '「你怎麼知道自己這件事做得不錯？」', why: '讓孩子說出「為什麼覺得不錯」，比大人直接稱讚，更能建立孩子的自信心。' }, { label: '孩子說「不知道」「沒有」', resp: '「今天有沒有哪件事，做完之後覺得還可以，沒有很糟？」', why: '把標準從「很好」改成「還可以」，孩子比較容易找到答案，也比較願意說。' }, { label: '孩子說「都不滿意」', resp: '「那今天有沒有哪件事，你其實已經很努力了，但結果卻沒有想像中的那樣？」', why: '把焦點從「結果好不好」換成「有沒有努力」，幫孩子學會看見自己努力的過程。' } ], avoid: '「才這樣就滿意了？」或「哇~你好棒！」——前者讓孩子覺得怎麼做都不夠好，後者容易讓孩子覺得評估標準在家長的手裡。' },
      { q: '今天有沒有什麼事，你本來想說，但後來沒有說出口的？', answers: [ { label: '孩子說「有」', resp: '「是還沒想好要怎麼說，還是覺得說了也沒有用？」', why: '幫孩子分清楚是「還沒準備好」，還是「選擇不說」，這兩種沉默背後的意義很不一樣。' }, { label: '孩子說「沒有」', resp: '「那今天有沒有說了什麼，後來有點後悔的？」', why: '從「沒說的」換成「說出口的」，幫孩子思考說話和結果之間的關係。' }, { label: '孩子說「有，但不想講」', resp: '「好，不用說沒關係。那件事是跟同學有關，還是跟老師有關？」', why: '不問內容，只給小的選擇，這樣孩子反而願意多說一點。' } ], avoid: '「什麼事？你說啊！」——施壓會讓孩子把剛才打開的門關回去。' },
      { q: '今天在學校，有沒有哪個時候，你覺得自己很自在、很像平常的自己？', answers: [ { label: '孩子說了某個時刻', resp: '「那個時候有什麼不一樣？」', why: '讓孩子慢慢說出「什麼情況下最自在」，這是非常珍貴的自我認識。' }, { label: '孩子說「不知道什麼叫像自己」', resp: '「就是那種不用裝、不用特別表現，很自在的感覺。今天有嗎？」', why: '先幫孩子理解問題，再問一次。' }, { label: '孩子說「好像都還好」', resp: '「那有沒有哪個時候，覺得自己要努力配合別人？」', why: '從「不像自己」切入，孩子通常更快找到答案。' } ], avoid: '「你本來就是你啊。」——這樣回答會讓孩子覺得這個問題很沒有意義，反而失去了自我探索的機會。' },
      { q: '今天有沒有遇到什麼比較麻煩、或是比較不順利的事？那時候你是什麼感覺？', answers: [ { label: '孩子說了某件事', resp: '「後來怎麼了？」', why: '最簡單的四個字，讓孩子繼續說完，不評論、不建議。' }, { label: '孩子說「沒有」', resp: '「那今天有沒有什麼事，讓你多花了一點力氣？」', why: '把「麻煩」改成「多花力氣」，孩子更容易回答。' }, { label: '孩子說了，但情緒還是很激動', resp: '（先不說話，等孩子說完。）然後說：「聽起來那個時候真的很煩。」', why: '先接住情緒，不用急著給建議。' } ], avoid: '「那你應該要⋯⋯」「你下次要⋯⋯」——孩子還在消化情緒，太早給出方法，孩子會覺得自己的感覺不重要。' },
      { q: '如果今天可以從腦袋裡刪掉一件事，你會想刪掉哪一件？', answers: [ { label: '孩子說了某件事', resp: '「那件事現在還會讓你不舒服嗎？還是說出來就好多了？」', why: '確認孩子當下的感覺，還是不舒服就繼續陪伴；說完就好了，不需要再深挖。' }, { label: '孩子說「不知道」或「沒有」', resp: '「那今天有沒有哪件事，你覺得如果沒有發生就好了？」', why: '換個說法，孩子比較容易理解。' }, { label: '孩子說了，但語氣很輕鬆', resp: '「好，那我們把它刪掉了（笑），不見了～」（然後繼續聊別的）', why: '如果孩子已經消化了，就陪他幽默地結束這個話題就好。' } ], avoid: '「這件事你要學會放下。」——對孩子來說，「放下」太抽象了，有時候他只是想說一說而已。' },
    ]
  },
  {
    id: 2, emoji: '📚', label: '陪伴功課', sub: '覺察思考路徑與耐力',
    navClass: 'n2', shClass: 'sh2', dotClass: 'd2', cardClass: 'c2',
    accentColor: '#3D5FA3',
    core: '引導孩子觀察自己「面對困難」時的心理運作。',
    enc: {
      intro: '寫功課不只是學習，更是在面對「卡住、挫折、想放棄」。家長的角色，不是盯進度，而是陪孩子理解自己。',
      items: [
        { title: '理解卡住是正常的', body: '讓孩子知道卡住不是因為笨，而是大腦在解題的時候本來就會當機。' },
        { title: '連接身體訊號', body: '將耐心「比喻為電量」或詢問「身體哪裡不舒服」，建立身心連結，教孩子學會主動休息，而非硬撐。' },
        { title: '換角色思考', body: '「給同學建議」能引導孩子啟動解決問題的邏輯，孩子會用更溫柔、更清楚的方式思考問題。' },
      ]
    },
    questions: [
      { q: '我看你盯這題一陣子了，你現在是腦袋一片空白，還是有在想但卡住了？', answers: [ { label: '孩子說「一片空白」', resp: '「是一看到題目就空白，還是想了一下才空白？」', why: '幫孩子找到「是從哪裡開始卡住」，通常不是整題不會，而是某個環節卡住了。' }, { label: '孩子說「有在想，但想不出來」', resp: '「那種感覺是快想到了，還是根本不知道方向？」', why: '幫孩子分清楚「快想到了」和「完全沒方向」，這兩種狀況需要的幫助是不同的。' }, { label: '孩子說「不知道」「都不是」', resp: '「那你現在看著這題，是什麼感覺？」', why: '先從「感覺」開始，孩子通常更容易描述感受，從感受往往可以找到卡點。' } ], avoid: '「這題你不是學過了嗎？」——孩子已經卡住了，這句話會讓他覺得「卡住是自己的問題」，反而更容易感到緊張。' },
      { q: '你剛才改掉的那個地方，是自己發現寫錯了，還是重新看題目才發現的？', answers: [ { label: '孩子說「自己發現的」', resp: '「你怎麼發現的？是覺得怪怪的，還是算了一下發現不對？」', why: '讓孩子知道自己有「發現錯誤」的能力。' }, { label: '孩子說「看題目才發現的」', resp: '「所以再看一次題目有幫助？你平常寫完會再看一次嗎？」', why: '自然地帶出「檢查」這個習慣，從經驗裡長出來，而不是被要求出來的。' }, { label: '孩子說「不知道，就改了」', resp: '「那改完之後，你覺得有幾分把握是對的？」', why: '不追究怎麼發現的，引導孩子評估自己的答案，也是一種自我監控的練習。' } ], avoid: '「你要養成檢查的習慣！」——孩子剛剛其實就正在做檢查，這句話會讓他覺得自己做的不算數，削弱剛才的成就感。' },
      { q: '寫到現在，你覺得還有多少電？還很多，還是快沒電了？', answers: [ { label: '孩子說「還有電」', resp: '「那我們繼續，你想先寫哪一題？」', why: '給孩子主控權，讓他決定順序，孩子會更有動力。' }, { label: '孩子說「快沒電了」', resp: '「你覺得你可以撐到哪裡再休息？」', why: '讓孩子自己評估自己的狀態，練習自我調節，而不是等家長決定。' }, { label: '孩子說「沒電了」', resp: '「是哪裡累？眼睛、手，還是腦袋？」', why: '幫孩子定位「哪裡累」，不同的累有不同的恢復方式，讓孩子學會傾聽自己身體的訊號。' } ], avoid: '「沒電也要寫完。」——孩子說出「快沒電」，是在練習誠實地自我評估，這句話會讓孩子不敢誠實地說出感受。' },
      { q: '你覺得寫國語跟寫數學，哪個比較累？感覺一樣嗎？', answers: [ { label: '孩子說「數學比較累，感覺不一樣」', resp: '「哪裡不一樣？」', why: '讓孩子自己說出差異，這個辨識的過程本身就是很好的自我覺察。' }, { label: '孩子說「都一樣」', resp: '「是腦袋累，還是手比較累？」', why: '給一個具體的切入點，幫孩子開始區分不同科目帶來不同身體的感受。' }, { label: '孩子說「國語比較累」', resp: '「是因為要想的東西比較多，還是因為要一直寫字？」', why: '幫孩子區分「認知負擔」和「體力負擔」，對孩子理解自己的學習狀態很有幫助。' } ], avoid: '「數學比較重要，要多花時間。」——孩子在分享感受，不是在比較哪個科目重要，這句話會讓孩子覺得自己的感受被忽略了。' },
      { q: '如果真的寫不下去了，是身體不舒服？還是心裡有點煩？', answers: [ { label: '孩子說身體不舒服', resp: '「那要不要先動一動？或者起來走一走？」', why: '直接回應身體的需求，讓孩子學到「身體的訊號是可以被處理的」，而不需要硬撐。' }, { label: '孩子說「心裡煩」', resp: '「是煩作業，還是在想別的事情？」', why: '區分「作業帶來的煩」和「其他的情緒干擾」，如果是後者，需要先處理那個情緒再繼續寫作業。' }, { label: '孩子說「兩個都有」', resp: '「哪一個比較多？」', why: '先找出主要的原因，聚焦在一件事上，才能理解情緒的來源。' } ], avoid: '「不舒服也要寫，哪有那麼多理由。」——孩子學會說出「身體不舒服」是很珍貴的自我覺察，這句話會讓孩子覺得「感受不重要」。' },
      { q: '這題是用老師教的方法，還是你自己想到的？', answers: [ { label: '孩子說「老師教的」', resp: '「你怎麼知道這個方法可以用在這裡？」', why: '讓孩子說出「辨認題型、套用方法」的思考過程，說出來之後，孩子會更有意識地運用它。' }, { label: '孩子說「自己想到的」', resp: '「你怎麼想到的？」', why: '讓孩子說出自己的創造性思考過程，說出來之後他會更相信自己有這個能力。' }, { label: '孩子說「不知道」', resp: '「那你覺得這個答案有幾成把握是對的？」', why: '從「怎麼想到的」轉移到「自己有多確定」，這是在練習自我評估。' } ], avoid: '「老師教的方法才是正確的。」——孩子自己想到的方法如果是對的，這句話會讓他依賴標準答案，而不是自己思考。' },
      { q: '我看你寫完這題嘆了一口氣，是因為終於寫完了，還是想到後面還有？', answers: [ { label: '孩子說「終於寫完了」', resp: '「這題哪裡最難？」', why: '趁孩子剛完成、情緒比較放鬆的時候回顧剛才的過程，是很好的覆盤時機，比較沒有壓力。' }, { label: '孩子說「想到後面還有」', resp: '「後面還有幾題？你覺得哪一題最讓你有壓力？」', why: '讓孩子把「很多」這個模糊感，變成具體的數量和內容，有時候說出來會發現沒有想像中多。' }, { label: '孩子說「兩個都有」', resp: '「先恭喜你這題寫完了。後面的我們等一下再看。」', why: '先把完成的事情確認一下，讓孩子感受到每一個小小的過程都值得被看見。' } ], avoid: '「嘆什麼氣，趕快寫下一題。」——孩子的嘆氣是情緒的釋放，打斷它會讓孩子覺得不被尊重，也更容易感到焦慮。' },
      { q: '你比較喜歡安靜寫功課，還是有一點聲音的時候比較容易寫？有音樂的話，你會不會比較容易分心？', answers: [ { label: '孩子說「要安靜」', resp: '「那現在環境你覺得夠安靜嗎？還是有哪裡讓你覺得吵？」', why: '把孩子的偏好，連結到當下的環境，讓孩子感受到自己的需求是可以被滿足的。' }, { label: '孩子說「要有聲音」', resp: '「什麼樣的聲音比較剛好？音樂、電視聲，還是有人在旁邊的聲音？」', why: '幫孩子更精準地認識自己需要的「背景音」是哪一種，找到適合自己的學習環境。' }, { label: '孩子說「都可以」', resp: '「那你有沒有發現，什麼狀況下寫起來會比較順？」', why: '從「環境喜好」轉到「狀態觀察」，幫孩子觀察自己的學習節奏。' } ], avoid: '「寫功課就是要安靜，不能聽音樂。」——每個孩子的專注模式不同，這句話會讓孩子停止探索認識自己學習方式的機會。' },
      { q: '這些生字，你想一次寫完，還是寫一點、休息一下再繼續？', answers: [ { label: '孩子說「一次寫完」', resp: '「好，那我們先看一下總共有幾個，你再決定什麼時候完成。」', why: '尊重孩子的策略選擇，並讓他自主決定完成的時間，孩子會更有責任感。' }, { label: '孩子說「分段寫」', resp: '「那你覺得寫幾個之後休息一下比較剛好？」', why: '讓孩子自己設定節奏，而不是家長規定，孩子會更願意遵守自己定的規則。' }, { label: '孩子說「不想寫」', resp: '「是生字太多，還是現在有點累、狀態不好？」', why: '先分清楚是「任務本身的問題」還是「當下狀態的問題」，兩個是不同的，處理的方式也會不一樣。' } ], avoid: '「沒得選，就是要寫完。」——問這個問題的目的是讓孩子練習規劃自己的任務，取消選擇權會讓孩子失去練習思考與規劃的機會。' },
      { q: '如果你同學也卡在這一題，你會想給他什麼建議？', answers: [ { label: '孩子說出了一個建議', resp: '「那你要不要也試試看這個方法？」', why: '孩子對別人說得出來的建議，往往就是他自己需要的，輕輕把它反射回去，讓孩子自己發現這一點。' }, { label: '孩子說「我也不知道」', resp: '「如果你是老師，你會怎麼提示他？」', why: '換一個角色，從「同學」換成「老師」，孩子可能更容易想到方法。' }, { label: '孩子說「叫他去問老師」', resp: '「好主意，那你現在要不要也試著去問老師？還是要再試一次？」', why: '「問老師」是很好的策略，不需要否定孩子，然後把選擇權還給孩子。' } ], avoid: '「你都會給別人建議，自己怎麼不會？」——這句話會讓孩子覺得表達想法會被拿來反過來批評自己，久了會降低孩子分享與思考的意願。' },
    ]
  },
  {
    id: 3, emoji: '🍽️', label: '餐桌對話', sub: '覺察情緒與價值觀',
    navClass: 'n3', shClass: 'sh3', dotClass: 'd3', cardClass: 'c3',
    accentColor: '#C06A1A',
    core: '透過日常選擇，覺察自己的喜好與判斷標準。',
    enc: {
      intro: '餐桌是最自然的「價值觀教室」。這些提問能培養孩子的「界限感」與「共好意識」。',
      items: [
        { title: '建立情緒界線', body: '談「不公平」、「不舒服」，訓練孩子的道德判斷與情緒界線，讓孩子知道感受是可以被討論的。' },
        { title: '理解自己在團體中的位置', body: '討論「分組角色」，覺察同儕壓力與個人特質，幫孩子找到適合自己的角色，而不是硬要改變。' },
        { title: '練習溝通與調整', body: '討論「改規矩」，給予孩子主控感，讓他明白環境是可以透過理性溝通讓彼此共好的。' },
      ]
    },
    questions: [
      { q: '如果你心情不好的時候，最想吃哪道菜？今天桌上有嗎？', answers: [ { label: '孩子說出一道菜', resp: '「為什麼是這一道？是因為味道很好，還是吃的時候會想到什麼？」', why: '食物往往連結著記憶和感覺，讓孩子說出「為什麼」，往往會帶出意想不到的溫暖話題。' }, { label: '孩子說「不知道」「隨便」', resp: '「那你現在心情怎麼樣？今天桌上有沒有你比較想吃的？」', why: '把問題拉回當下，從「假設心情不好」換成「當下的狀態」，孩子比較容易說出真實感受。' }, { label: '孩子說了，但今天桌上沒有', resp: '「改天我們來做這道菜，你來告訴我你喜歡的口味。」', why: '把對話變成一個小小的約定，孩子會感覺到自己的喜好被記住了、被重視了。' } ], avoid: '「心情不好還挑食？」——孩子正在分享情緒和食物之間的連結，否定會讓他之後不願意說出這些感受。' },
      { q: '今天有沒有發生讓你覺得不公平的事情？', answers: [ { label: '孩子說「有」並開始說', resp: '（先聽完，然後說）那時候你的感覺是什麼？', why: '先讓孩子把事情完整說完，再進入「感覺」的整理。很多時候家長會急著講道理或幫對方解釋，但孩子更需要的是先被理解。' }, { label: '孩子說「沒有，都還好」', resp: '「那今天有沒有什麼事，讓你覺得『還好有這樣』或者『還好沒有發生那樣』？」', why: '用另一種角度回顧這一天，也可能帶出同樣有價值的話題。' }, { label: '孩子越說越激動', resp: '「聽起來那個時候你真的很生氣。我們現在先好好吃飯，等等再繼續聊，好嗎？」', why: '先接住情緒，但餐桌不適合把情緒燒得太旺，溫柔地約定飯後繼續，讓孩子知道這件事值得被好好討論。' } ], avoid: '「這有什麼不公平，你要學會接受。」或「對方也是有原因的阿⋯⋯」——孩子說感受的時候，家長第一句話不能是說教或替對方辯解，這會讓孩子覺得自己的感覺被否定。' },
      { q: '你最好的朋友，你最喜歡他哪一點？', answers: [ { label: '孩子說出一個特質', resp: '「有沒有什麼時候，讓你特別感覺到他這一點？」', why: '從抽象的特質拉到具體的事件，孩子在說那個故事的過程中，會更清楚地意識到自己重視什麼。' }, { label: '孩子說「不知道，就是喜歡他」', resp: '「那你們平常最喜歡一起做什麼？」', why: '從「喜歡他什麼」換成「喜歡跟他做什麼」，孩子更容易回答，也一樣能看出他重視的東西。' }, { label: '孩子說出很多特質', resp: '「如果只能選一個，你覺得最重要的是哪一個？」', why: '讓孩子自己排出優先順序，這是在幫他釐清交朋友時最在意的核心價值。' } ], avoid: '「那個朋友功課好不好？」「他家在哪裡？」——這些問題會讓孩子覺得家長在評估他的朋友，而不是真的對他的感受好奇。' },
      { q: '你們班分組的時候，你通常是出主意的，還是幫忙做事的？你自己比較喜歡哪一種？', answers: [ { label: '孩子說「我會出主意，而且我喜歡」', resp: '「你的想法通常大家會接受嗎？還是有時候說了沒人理你？」', why: '帶孩子看看「提出想法之後的經驗」，包含被接受的成就感，也包含被忽略的感受。' }, { label: '孩子說「我通常是幫忙做，但其實也想出點主意」', resp: '「有沒有試過說出你的想法？結果怎麼樣了？」', why: '了解孩子「有沒有嘗試過」以及當時的經驗，有時候不是沒機會，而是還在找怎麼開口。' }, { label: '孩子說「都可以，看情況」', resp: '「那什麼時候你會比較想說想法？什麼時候會比較想跟著大家？」', why: '讓孩子思考自己在什麼情況下會主動、什麼情況下會退後，這是很有價值的自我認識。' } ], avoid: '「你要勇敢一點，多說你的想法。」——孩子還在描述自己的經驗時就被要求改變，容易讓他覺得現在的自己不夠好。' },
      { q: '今天有沒有哪件事，是你自己決定怎麼做的？後來結果怎麼樣了？', answers: [ { label: '孩子說了一件事，結果還不錯', resp: '「你當時是怎麼決定要這樣做的？」', why: '讓孩子說出「怎麼想的」，比稱讚結果更重要，孩子會意識到自己其實是有判斷能力的。' }, { label: '孩子說了一件事，結果不太好', resp: '「如果再來一次，你覺得還會這樣做嗎？還是會想換個方式？」', why: '不急著說對錯，讓孩子自己回頭看，練習從經驗中學習。' }, { label: '孩子說「沒有，都是照別人說的做」', resp: '「那有沒有哪個時候，你其實有自己的想法，但最後沒有說出來？」', why: '探索孩子「心裡的想法」，比直接問「為什麼不自己決定」更溫和，也更容易讓孩子開口。' } ], avoid: '「你要有自己的主見！」——孩子正在分享今天的經驗，這句話會讓他覺得被評價，而不是被理解，反而不容易再說下去。' },
      { q: '我們家有沒有哪個規定，你覺得可以改一下？如果改了，你覺得會有什麼不一樣？', answers: [ { label: '孩子說出一個規定', resp: '「你覺得當初為什麼會有這個規定？」', why: '先一起理解「為什麼會有這個規定」，再討論修改，對話不會變成單純的抱怨，而是練習理性溝通。' }, { label: '孩子說「沒有，都還好」', resp: '「那有沒有哪個規定，其實有幫到你，讓你覺得還不錯？」', why: '從「想改的」換成「有幫助的」，幫孩子看見規則帶來的好處。' }, { label: '孩子說了，但語氣有點抱怨', resp: '「聽起來這個讓你不太舒服。那怎麼改，你會覺得比較合理？」', why: '先接住情緒，再引導孩子提出具體的替代方案，把抱怨轉化成建設性的討論。' } ], avoid: '「規定就是規定，哪有那麼多意見。」——這樣會直接關掉對話，孩子會覺得自己的想法不被重視，也不再願意表達。' },
      { q: '你有沒有發生過，本來是不太想做，但朋友一說就跟著一起去做的情況？後來感覺怎麼樣？', answers: [ { label: '孩子說「有，後來還不錯」', resp: '「所以那次你覺得跟著去做是個不錯的決定？」', why: '讓孩子自己回頭看這個選擇，由他說出結論，比大人下判斷更有意義。' }, { label: '孩子說「有，後來有點後悔」', resp: '「那時候你其實不太想去，是什麼讓你最後還是跟去了？」', why: '不是在責怪孩子，而是幫他覺察「影響決定的那個關鍵點是什麼」，這個覺察是未來做選擇的重要基礎。' }, { label: '孩子說「沒有，我不太會被說動」', resp: '「那如果真的遇到你不想做、但朋友很想做的事，你通常會怎麼說？」', why: '不質疑孩子的說法，而是理解他平常怎麼表達、怎麼拒絕，也是在練習覺察自己的人際策略。' } ], avoid: '「所以你就這樣被帶著走？要有自己的想法。」——孩子正在誠實地分享一個經驗，這樣的回應會變成評價，下次他可能就不願意再說了。' },
      { q: '今天有沒有人說了什麼話，讓你聽了有點不舒服？', answers: [ { label: '孩子說「有」，並說出那句話', resp: '「你那時候第一個感覺是什麼？」', why: '先讓孩子說「感覺」，不急著判斷那句話對不對。很多時候，孩子把感受說出來後，就會開始自己整理與理解。' }, { label: '孩子說「沒有」', resp: '「那今天有沒有哪句話，讓你聽了覺得很開心，或覺得有被鼓勵到的感覺？」', why: '從另一個方向切入，幫孩子也看見讓自己感覺好的經驗。' }, { label: '孩子說了，但不確定是不是真的不舒服', resp: '「那句話現在想起來還會有點怪怪的，還是已經過了？」', why: '確認情緒「現在還在不在」，還在就陪著多聊一點，如果過了就不用一直停留。' } ], avoid: '「他只是開玩笑的啦，你不要那麼敏感。」——孩子的不舒服是真實的感受，否定那個感受會讓孩子學到「自己的感覺不可信」。' },
      { q: '今天有沒有幫到誰，或是讓誰覺得比較開心？', answers: [ { label: '孩子說「有」，並分享了一件事', resp: '「你怎麼知道他有變開心？」', why: '讓孩子說出他觀察到的線索，在練習讀懂別人情緒的能力，同時讓孩子更意識到自己對他人的影響力。' }, { label: '孩子說「沒有」', resp: '「那今天有沒有人幫到你，或者讓你心情好一點？」', why: '從「付出」換成「收到」，讓孩子也練習覺察別人對自己的善意。' }, { label: '孩子說「不確定」', resp: '「那有沒有哪件事，是你在做的時候有想到對方的感受？」', why: '降低門檻，只要孩子在做的時候有想到別人，這個過程本身就很值得被看見。' } ], avoid: '「你要多想想別人，不要只想自己。」——這個問題是在培養孩子看見善意，不是在糾正行為，說教會把溫暖的對話變成壓力。' },
      { q: '今天有沒有哪件事，是你自己覺得還不錯、還蠻滿意的？', answers: [ { label: '孩子說出某件事', resp: '「你怎麼知道自己這件事做得還不錯？」', why: '讓孩子說出自己的判斷標準，比大人直接稱讚，更能建立內在的自信。' }, { label: '孩子說「沒有」「都很普通」', resp: '「那今天有沒有哪件事，是做起來比昨天更順，或比上次更好一點？」', why: '把「好不好」換成「有沒有進步」，孩子更容易找到，也更貼近成長型思維。' }, { label: '孩子說了，但語氣很輕描淡寫', resp: '「那件事你說得很輕鬆，但聽起來其實不太容易，你自己有沒有覺得做得還不錯？」', why: '有些孩子習慣低估自己，大人可以幫他把那份努力「說清楚」，孩子才有機會真正接收到那個肯定。' } ], avoid: '「才這樣就滿意了？」或「哇你好棒！」——前者讓孩子覺得怎麼做都不夠好，後者讓評估標準停留在家長手裡，兩個都會讓孩子的內在自信長不出來。' },
    ]
  },
  {
    id: 4, emoji: '🎮', label: '螢幕遊戲時間', sub: '覺察沉浸感與控制力',
    navClass: 'n4', shClass: 'sh4', dotClass: 'd4', cardClass: 'c4',
    accentColor: '#7A4DB0',
    core: '讓孩子觀察自己在數位世界的心理狀態。',
    enc: {
      intro: '與其禁止，不如引導他觀察「為什麼被吸引」。這是在數位時代培養「數位自律」的第一步。',
      items: [
        { title: '看見吸引力來源', body: '問「好玩在哪」，幫助孩子釐清自己追求的是成就感、社交還是逃避壓力。' },
        { title: '覺察停不下來的原因', body: '觀察「什麼時候想停」，讓孩子意識到多巴胺對大腦的影響，訓練自律神經的覺察。' },
        { title: '練習面對情緒', body: '「遊戲輸了的感覺」是面對挫折很好的教育機會，引導孩子覺察憤怒後的行為選擇。' },
      ]
    },
    questions: [
      { q: '這個遊戲你覺得好玩在哪裡？是破關的感覺，還是打贏的感覺？', answers: [ { label: '孩子說「破關的感覺」', resp: '「破關那一刻，你心裡是什麼感覺？會不會有點像解出一道難題的感覺？」', why: '把遊戲中的成就感，慢慢連到學習中的成就感，讓孩子自己發現兩種「成功的感覺」其實很像。' }, { label: '孩子說「打贏的感覺」', resp: '「打贏之後，你通常會做什麼？會開心一下，還是馬上想再來一局？」', why: '讓孩子觀察自己「贏了之後的反應」，開始覺察那種想一直玩的感覺是怎麼來的。' }, { label: '孩子說「都不是，就是好玩」', resp: '「那你最喜歡這遊戲的哪一個部分？是畫面、音樂、還是跟朋友一起玩？」', why: '給孩子更具體的方向去想，幫孩子找到自己真正被吸引的元素是什麼。' } ], avoid: '「玩遊戲有什麼好玩，不如去看書。」——孩子正在打開話題、分享自己的感受，一旦被否定，後面的對話很容易直接關掉。' },
      { q: '你剛剛遊戲輸了，現在是什麼感覺？還想繼續玩嗎？', answers: [ { label: '孩子說「很生氣，還想再玩」', resp: '「你覺得現在這個狀態再玩，會比較容易贏，還是比較容易失誤？」', why: '讓孩子自己看見「情緒會影響表現」，比直接說他衝動，更容易被接受。' }, { label: '孩子說「有點失落，不想玩了」', resp: '「這種感覺通常會維持多久？你平常會怎麼讓自己好一點？」', why: '不急著安慰，讓孩子說出自己的情緒恢復方法，這就是在練習自我調節。' }, { label: '孩子說「沒什麼感覺，輸就輸了」', resp: '「你一直都這樣，還是慢慢練出來的？」', why: '幫孩子覺察這種「放得下」的能力是怎麼來的，讓他更有意識地理解自己的心態。' } ], avoid: '「輸了就不要玩了，這有什麼好玩的。」——孩子正在經歷挫折，這是很好的學習時機。如果被否定，只會讓孩子更抗拒或更在意輸贏。' },
      { q: '你一直想玩這遊戲，是因為快破關了，還是有什麼讓你停不下來的原因？', answers: [ { label: '孩子說「快破關了」', resp: '「如果今天沒破關，你覺得會怎樣？明天還會想再玩嗎？」', why: '幫孩子看看自己對「差一點就完成」的感覺有多在意，也慢慢理解為什麼會一直想再試一次。' }, { label: '孩子說「就是想玩，說不出原因」', resp: '「那你有沒有發現，當你不玩的時候，腦袋還會一直想到這個遊戲？」', why: '讓孩子注意「遊戲有沒有一直留在腦袋裡」，這本身就是很重要的自我觀察。' }, { label: '孩子說「因為朋友都在玩」', resp: '「如果朋友都不玩了，你自己還會想玩嗎？」', why: '幫孩子釐清「自己真的喜歡」或「因為朋友而玩」，兩種動機都很正常，但讓孩子知道差別。' } ], avoid: '「你就是上癮了才停不下來。」——「上癮」這個詞對孩子是很重的標籤，在孩子還沒自己覺察之前貼上去，孩子會開始防衛，而不是去理解自己的狀態。' },
      { q: '如果你真的變成遊戲裡的角色，你最想使用他哪一個能力？', answers: [ { label: '孩子說出某個能力或行動', resp: '「你喜歡這個能力，是因為它很厲害，還是因為現實中比較難做到？」', why: '讓孩子思考自己嚮往什麼能力，是來自「讓自己變強」還是「補足現實中的某些不足」，說出來是很好的自我認識。' }, { label: '孩子說「全部都想要」', resp: '「如果只能選一個帶到現實生活，你會選哪一個？為什麼？」', why: '透過「只能選一個」，幫孩子找到自己最在意、最渴望的部分。' }, { label: '孩子說「不知道，就是想變成他」', resp: '「你覺得這個角色跟你最不一樣的地方是什麼？」', why: '從「想變成他」回頭看自己，幫孩子更清楚認識自己的特質與期待。' } ], avoid: '「遊戲都是假的，想這些沒有用。」——孩子正在用想像去理解自己、投射期待，這是很重要的內在探索過程。被否定之後，孩子會比較不願意分享內心想法。' },
      { q: '你在遊戲裡有沒有認識的朋友？跟他們聊天，跟在學校與同學聊天，感覺一樣嗎？', answers: [ { label: '孩子說「不一樣，線上比較自在」', resp: '「你覺得為什麼線上比較自在？是因為不用面對面，還是可以自己決定什麼時候回應？」', why: '幫孩子說清楚「自在的原因」，他會更了解自己需要什麼樣的互動方式。' }, { label: '孩子說「一樣」', resp: '「那你在遊戲裡跟在學校，表現出來的自己是差不多的嗎？」', why: '讓孩子看看不同場域中的自己，是否是一樣的，或者有沒有不一樣的地方。' }, { label: '孩子說「遊戲裡沒有朋友，自己玩」', resp: '「你比較喜歡自己玩，還是有時候也會想有人一起玩？」', why: '不用預設孩子需要線上社交，讓他說出自己的喜好，認識自己的社交習慣。' } ], avoid: '「網路上的朋友不是真的朋友。」——對孩子來說，那些互動和連結可能很真實，被否定會讓他覺得不被理解，也不想再分享。' },
      { q: '你有沒有那種玩到一半，自己就不想玩了的時候？還是通常要別人提醒才會停？', answers: [ { label: '孩子說「有，我自己會停」', resp: '「那個『不想玩了』的感覺，是因為覺得膩了，還是覺得已經夠了？」', why: '幫孩子分清楚「玩膩了」和「覺得滿足了」，這會影響他之後怎麼安排時間。' }, { label: '孩子說「都要人叫」', resp: '「如果沒有人提醒，你覺得你大概會玩到什麼時候？」', why: '讓孩子自己想像「界線在哪裡」，比大人直接規定，更容易產生覺察。' }, { label: '孩子說「有時候自己停，有時候要人叫」', resp: '「那什麼時候你比較會自己停？那時候有什麼不一樣？」', why: '找出「可以自己停下來的條件」，比一直問為什麼做不到，更有幫助。' } ], avoid: '「你就是自制力不好，才需要人一直提醒。」——孩子願意誠實說需要提醒，是很重要的訊號，如果被貼標籤，下次就不會說真話了。' },
      { q: '你玩完遊戲之後，通常是什麼感覺？是很滿足，還是有時候會有點怪怪的？', answers: [ { label: '孩子說「很滿足」', resp: '「那種滿足，跟吃到喜歡的東西一樣嗎？還是有點不一樣？」', why: '用孩子熟悉的經驗來對照，幫他更清楚說出「這種滿足是什麼樣子」。' }, { label: '孩子說「有時候怪怪的」', resp: '「那個怪怪的是什麼感覺？是有點空空的、還是有點後悔，還是別的？」', why: '幫孩子更精準地描述那個感受，這是非常重要的自我覺察訊號，值得花時間說清楚。' }, { label: '孩子說「不知道，就是玩完了」', resp: '「那你玩完之後，通常第一件事會做什麼？那時候心情大概是怎樣？」', why: '從「做了什麼」回推「感覺是什麼」，孩子比較容易找到線索。' } ], avoid: '「所以玩遊戲會讓你覺得空虛，以後少玩一點。」——孩子好不容易說出那種說不太清楚的感覺，如果馬上被拿來限制行為，他之後就不太會再分享。' },
      { q: '這個遊戲裡，哪一關最讓你覺得很卡、很煩？你後來是怎麼撐過去的？', answers: [ { label: '孩子說出某一關，並已經過關', resp: '「那時候你有沒有想過放棄？是什麼讓你還是繼續？」', why: '讓孩子說出「自己為什麼能撐住」，這種動力，其實可以用在其他困難的事情上。' }, { label: '孩子說「還卡在那裡，還沒過」', resp: '「你現在是用什麼方法？有沒有換過別的方法？」', why: '把「卡關」變成「找方法的過程」，孩子其實正在練習解決問題。' }, { label: '孩子說「我就跳過或直接放棄那關」', resp: '「你怎麼知道那時候可以先跳過去？」', why: '不批評放棄，而是讓孩子找出「什麼時候該停、什麼時候該繼續」。' } ], avoid: '「玩遊戲卡關這麼認真，功課怎麼不這樣？」——這句話很容易讓孩子覺得被比較、被指責，對話會立刻中斷，甚至更抗拒學習。' },
      { q: '你看到別人的裝備比你好的時候，你會先想到什麼？', answers: [ { label: '孩子說「想要跟他一樣」', resp: '「那你會怎麼想辦法得到？是自己慢慢玩出來，還是會想用買的？」', why: '讓孩子說出「面對想要的東西時，自己會怎麼做」，也是在練習分辨努力與消費的選擇。' }, { label: '孩子說「沒感覺，裝備不重要」', resp: '「那對你來說，這個遊戲裡什麼比較重要？」', why: '幫孩子說出自己真正重視的東西，這其實就是在建立自己的價值觀。' }, { label: '孩子說「有點羨慕，但也沒辦法」', resp: '「那種羨慕的感覺，你通常會怎麼處理？會一直想，還是很快就過去？」', why: '讓孩子覺察自己處理羨慕情緒的方式，這個能力在現實生活中也很重要。' } ], avoid: '「不要跟別人比，這樣不好。」——孩子才剛說出一個真實的感受，這句話並沒有幫他學習到怎麼處理比較之後的情緒。' },
      { q: '如果我現在說要關掉了，你心裡的感覺是什麼？', answers: [ { label: '孩子說「沒關係，我玩夠了」', resp: '「今天玩得還不錯嗎？有沒有哪一段你特別覺得很順或很開心？」', why: '孩子能說「夠了」，是很好的自我控制訊號，用輕鬆的收尾，讓他帶著滿足感結束。' }, { label: '孩子說「再一下下」', resp: '「那這個『一下下』大概是幾分鐘？你說一個時間吧。」', why: '把模糊的「一下下」變成具體時間，才有機會變成彼此可以遵守的約定。' }, { label: '孩子說「不甘心」或開始抗議', resp: '「你現在玩到哪裡了？跟我說一下。」', why: '先讓孩子說出進度，當孩子感覺到被重視，情緒通常會降溫，後續對話會更順利。' } ], avoid: '「現在就關掉，不要再講了。」——直接中斷會讓孩子有「被硬生生剝奪」的感覺，之後更容易抗拒，也更難建立自我控制。' },
    ]
  },
  {
    id: 5, emoji: '🌙', label: '睡前時刻', sub: '覺察自我與感恩',
    navClass: 'n5', shClass: 'sh5', dotClass: 'd5', cardClass: 'c5',
    accentColor: '#3A4A8A',
    core: '沉澱一整天的自我觀察，進行深度整合。',
    enc: {
      intro: '這是大腦進行「記憶鞏固」的黃金期。正向與溫暖的覺察能讓孩子在安全感中入睡。',
      items: [
        { title: '累積好的感覺', body: '詢問「小驕傲」或「被懂了」，訓練大腦過濾負面訊息，建立長期的自信與感恩神經迴路。' },
        { title: '建立成長型思維', body: '「明天可以試試看不同做法」是在教導孩子成長型思維，錯誤不是終點，而是調整自己的重要資訊。' },
        { title: '學會說出需求', body: '最後一題「最需要什麼」，教孩子練習精確表達內心需求，這對未來的人際關係非常重要。' },
      ]
    },
    questions: [
      { q: '今天有沒有什麼事情，讓你心裡有一點點小驕傲？', answers: [ { label: '孩子說出某件事', resp: '「那個時候你有沒有在心裡跟自己說什麼？還是只是有一種感覺？」', why: '讓孩子注意到「自己怎麼看自己」，有些孩子做了好事，但完全沒有給自己任何的肯定。' }, { label: '孩子說「沒有」', resp: '「那今天有沒有哪件事，做的時候有點費力，但做完之後覺得還可以？」', why: '把「驕傲」降低成「還可以」，孩子更容易找到類似的經驗。' }, { label: '孩子說「不知道，今天沒什麼特別的」', resp: '「那有沒有哪件事，昨天你沒做到，但今天你卻做到了？」', why: '把標準從「跟別人比」換成「跟自己比」，讓孩子慢慢習慣用成長的角度看自己。' } ], avoid: '「你今天其實表現很好，你有沒有發現？」——這樣會變成由大人來決定「好不好」，孩子容易依賴外在評價，而不是建立自己的判斷。' },
      { q: '如果你可以跟明天的自己說一句話，你會想說什麼？', answers: [ { label: '孩子說了一句鼓勵的話', resp: '「你會想到這句話，是因為今天發生了什麼事嗎？」', why: '把這句話連結今天的經驗，讓孩子看見「我為什麼會這樣想」，也協助孩子整理一天的學習。' }, { label: '孩子說了一句提醒或警告自己的話', resp: '「那如果明天真的遇到那種情況，你覺得可以先做什麼準備？」', why: '從「提醒自己」往前走一步，讓孩子從擔心轉移到行動，帶著一點掌控感入睡。' }, { label: '孩子說「不知道，沒有想說的」', resp: '「那如果明天遇到困難，你會希望自己記得什麼？」', why: '從「想說什麼」換成「希望自己記得什麼」，讓孩子從「給建議」的角度思考，通常更容易有答案。' } ], avoid: '「你應該跟明天的自己說要認真一點。」——這個問題的重點是讓孩子自己想，如果答案被大人填滿了，孩子就少了一次自我探索的機會。' },
      { q: '今天有沒有哪一種情緒，你以為已經過去了，但後來發現它還在？', answers: [ { label: '孩子說出某個情緒', resp: '「那個感覺現在還在嗎？還是說出來之後有好一點？」', why: '先看看情緒現在的狀態，如果還在，就多陪一下；如果已經好一點了，代表孩子已經能整理自己的情緒了。' }, { label: '孩子說「沒有，今天還好」', resp: '「那如果用一個顏色來形容心情，今天會是什麼顏色？」', why: '不用一定要說出情緒名稱，用顏色也可以幫助孩子回顧整天的感受。' }, { label: '孩子說了之後沉默', resp: '（先安靜陪著，可以輕輕拍拍或待在旁邊。）', why: '這種沉默，常常是在「整理情緒」，因此不需要急著填滿對話。' } ], avoid: '「不要想那麼多，快睡覺吧。」——孩子好不容易說出一個還沒走的情緒，這句話等於告訴他「你的感受不重要，睡覺才重要」。' },
      { q: '今天有沒有哪件事，做完之後你覺得自己還蠻勇敢的？', answers: [ { label: '孩子說出某件事', resp: '「你在做那件事之前，有沒有猶豫了一下？」', why: '讓孩子說出「勇敢之前的猶豫」，讓他理解勇敢不是沒有害怕，而是害怕了還是做了，這個理解對孩子很重要。' }, { label: '孩子說「沒有，今天沒什麼需要勇氣的」', resp: '「那今天有沒有哪件事，做的時候需要多一點點力氣，但你還是完成了？」', why: '把「勇敢」換成「多一點力氣」，讓孩子更容易在日常裡找到自己的努力。' }, { label: '孩子說「有，但說不太出來」', resp: '「那個感覺大概是在什麼時候出現？是跟誰在一起？」', why: '先從「時間、場景、人」開始，往往說出場景之後，感受也自然跟著出來了。' } ], avoid: '「你今天哪裡勇敢了，我都沒看到。」——這會讓孩子覺得，勇敢需要被別人認可才算數，反而忽略了他自己的感受。' },
      { q: '今天有沒有哪件事沒有做到你想要的樣子，但你覺得明天可以試試看不一樣的方法？', answers: [ { label: '孩子說出一件事，也想到新的做法', resp: '「你是怎麼想到這個方法的？」', why: '看見孩子「自己找方法」的能力，比評價方法好不好更重要，讓他帶著信心去睡。' }, { label: '孩子說「有沒做好的，但不知道怎麼改」', resp: '「你覺得那件事最難的地方在哪裡？」', why: '不急著給解決方案，先幫孩子定位難點，睡前不適合展開複雜的討論，明天再接著聊就好。' }, { label: '孩子說「沒有，今天都還好」', resp: '「那有沒有哪件事，你覺得如果再多一點時間，可能還可以更好？」', why: '把焦點從「沒做好」換成「還可以更好」，孩子比較容易開口，也比較沒有壓力。' } ], avoid: '「那件事你本來就應該做好的。」——孩子正在學習可以檢視自己，同時也能對自己保有一點空間，被責備之後反而更不敢面對。' },
      { q: '閉上眼睛，感覺一下身體，哪裡覺得最累？', answers: [ { label: '孩子說出某個部位', resp: '「那我幫你按一按那裡，還是你想自己動一動？」', why: '把覺察立刻轉化成行動，讓孩子感受到「說出身體的需求」是有用的。' }, { label: '孩子說「全部都累」', resp: '「如果只能選一個最累的地方，會是哪裡？」', why: '不否定「全部都累」，但讓孩子練習定位，這個定位本身就是一種身體覺察的練習。' }, { label: '孩子說「不知道，沒什麼感覺」', resp: '「我們一起深呼吸一下，慢慢吸氣、再慢慢吐氣。現在有沒有多一點感覺？」', why: '用呼吸幫孩子重新連結身體感受，有時候一個深呼吸就能讓孩子感受到之前沒注意到的緊繃。' } ], avoid: '「哪裡會累，你又沒做什麼。」——孩子說「累」是很真實的身體訊號，被否定之後，容易開始忽略自己的感覺。' },
      { q: '今天有沒有哪件事，讓你覺得：「原來我還會這一招！」？', answers: [ { label: '孩子說出某件事', resp: '「你之前就知道自己會這個嗎？還是今天才發現的？」', why: '讓孩子分清楚「已知的能力」或「今天新發現的能力」，「新發現」特別值得被記住。' }, { label: '孩子說「沒有，今天沒什麼特別」', resp: '「那有沒有哪件事，你用了跟平常不太一樣的方法？」', why: '把「新招」換成「不一樣的方式」，孩子比較容易想到，也更願意分享。' }, { label: '孩子說了，但有點不確定', resp: '「這樣其實就算一招了耶，你自己覺得呢？」', why: '重新幫孩子確認他的發現，有些孩子需要一點外在支持，才會相信自己的成長。' } ], avoid: '「這有什麼，本來就應該會。」——這句話會把孩子的「發現」變得很普通，久了之後，孩子會不再注意自己的進步。' },
      { q: '今天有沒有人讓你覺得「我被懂了、我被看見了」？', answers: [ { label: '孩子說出某個人', resp: '「他是做了什麼，或說了什麼，讓你有這種感覺？」', why: '把感覺變成具體的行動，孩子在描述的同時，也在學習怎麼讓別人感覺被理解。' }, { label: '孩子說「沒有」', resp: '「那今天有沒有哪一刻，你其實很希望有人能懂你，但卻沒有發生？」', why: '讓孩子也能說出「想被理解但卻沒有」的時候，這種感覺同樣重要，也需要被接住。' }, { label: '孩子說「你啊」（然後笑）', resp: '「哪一件事讓你有這種感覺？」', why: '不要只是說「謝謝」然後結束，讓孩子說出具體的時刻，這對親子關係而言，可是很珍貴的。' } ], avoid: '「當然是我最懂你啊。」——讓孩子自己說，比家長自己說更有意義，也更有感覺。' },
      { q: '今天最開心的一刻是什麼時候？', answers: [ { label: '孩子說出某個時刻', resp: '「現在再想一次，還是會有那種開心的感覺嗎？」', why: '讓孩子在睡前再感受一次那個開心，好的感覺多停留一下，對情緒穩定和入睡都很有幫助。' }, { label: '孩子說「不知道，今天普普通通」', resp: '「有沒有哪個小小的時刻，不是很大的開心，但還不錯？」', why: '把「最開心」換成「還不錯的小時刻」，幫助孩子在平常的一天裡，也能找到一點亮點。' }, { label: '孩子說了某個時刻，然後自己笑了', resp: '（跟著他笑，然後說）「好，帶著這個感覺睡吧。」', why: '不需要多說什麼，讓那個開心的畫面成為今天最後的句點，這是最好的睡前收尾。' } ], avoid: '「就這樣而已？」——任何大小的開心都值得被認真對待，這句話會讓孩子覺得自己的快樂太小、不值得被珍惜。' },
      { q: '現在這一刻，你比較需要一個抱抱、一句鼓勵，還是安靜一下？', answers: [ { label: '孩子說「抱抱」', resp: '（直接抱，不說話。）', why: '孩子已經說出需要，回應就好，不需要再解釋或延伸。' }, { label: '孩子說「鼓勵」', resp: '「那你希望我說什麼？還是我來想一個鼓勵給你？」', why: '讓孩子一起參與，他說出想被鼓勵的點，本身就是在表達內在需求。' }, { label: '孩子說「安靜的空間」', resp: '「好，我在這裡陪你，不說話。」', why: '尊重孩子需要獨處的感受，但讓他知道你還在。這句話讓孩子同時感受到「被尊重」和「被陪伴」。' } ], avoid: '「為什麼不要抱抱？你不喜歡我抱你了嗎？」——孩子選了某個選項，只是誠實說出自己的需求，家長如果帶著受傷的感覺並質問，孩子下次就不敢說真話了。' },
    ]
  },
];

// ── STATE ──────────────────────────────────────────────────
let currentScenario = 0;
let flippedCards = new Set();
let encOpen = false;

// ── MODAL ──────────────────────────────────────────────────
function openTip(i) {
  const t = TIPS[i];
  document.getElementById('tipIcon').textContent = t.icon;
  document.getElementById('tipTitle').textContent = t.title;
  document.getElementById('tipBody').textContent = t.body;
  document.getElementById('tipModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeTip() {
  document.getElementById('tipModal').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeTip(); });

// ── NAV ────────────────────────────────────────────────────
function renderNav() {
  const nav = document.getElementById('scenarioNav');
  nav.innerHTML = SCENARIOS.map((s, i) => `
    <button class="nav-btn ${s.navClass} ${i === currentScenario ? 'active' : ''}"
            onclick="switchScenario(${i})"
            aria-pressed="${i === currentScenario}">
      ${s.emoji} ${s.label}
    </button>
  `).join('');
}

function switchScenario(i) {
  currentScenario = i;
  flippedCards.clear();
  encOpen = false;
  renderNav();
  renderScenario();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── ENCYCLOPEDIA ───────────────────────────────────────────
function toggleEnc(e) {
  e.stopPropagation();
  encOpen = !encOpen;
  const enc = document.getElementById('encyclopedia');
  const btn = document.getElementById('encBtn');
  enc.classList.toggle('open', encOpen);
  btn.textContent = encOpen ? '收起 ↑' : '🧭 覺察小百科';
}

// ── CARDS ──────────────────────────────────────────────────
function toggleCard(idx) {
  const wrapper = document.getElementById('card-' + idx);
  if (flippedCards.has(idx)) {
    flippedCards.delete(idx);
    wrapper.classList.remove('flipped');
  } else {
    flippedCards.add(idx);
    wrapper.classList.add('flipped');
  }
}

// ── RENDER ─────────────────────────────────────────────────
function renderScenario() {
  const s = SCENARIOS[currentScenario];

  // Header
  document.getElementById('scenarioHeader').innerHTML = `
    <div class="sh-wrap">
      <div class="sh-card ${s.shClass}">
        <div class="sh-top">
          <div>
            <h2>${s.emoji} ${s.label}・${s.sub}</h2>
            <div class="core">核心：${s.core}</div>
          </div>
          <button class="enc-btn" id="encBtn" onclick="toggleEnc(event)">🧭 覺察小百科</button>
        </div>
      </div>
      <div class="encyclopedia" id="encyclopedia">
        <p class="enc-intro">${s.enc.intro}</p>
        ${s.enc.items.map(item => `
          <div class="enc-item">
            <div class="enc-dot" style="background:${s.accentColor}"></div>
            <div class="enc-body">
              <div class="enc-title">${item.title}</div>
              <div class="enc-text">${item.body}</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;

  // Cards
  document.getElementById('questionsGrid').innerHTML = s.questions.map((q, qi) => `
    <div class="card-wrapper ${s.cardClass}" id="card-${qi}" onclick="toggleCard(${qi})"
         role="button" tabindex="0" aria-label="Q${qi+1} 點擊翻轉查看接話建議"
         onkeydown="if(event.key==='Enter'||event.key===' ')toggleCard(${qi})">
      <div class="card-inner">
        <div class="card-front">
          <div>
            <div class="card-q-num">Q${qi + 1}</div>
            <div class="card-q-text">「${q.q}」</div>
          </div>
          <div class="card-hint">點擊看接話建議 →</div>
        </div>
        <div class="card-back">
          <div class="back-top-bar">
            <span class="back-q-num">Q${qi + 1} 接話建議</span>
            <span class="back-close">再點一下收起</span>
          </div>
          <div class="card-back-scroll">
            ${q.answers.map(a => `
              <div class="answer-block">
                <div class="answer-label">
                  <span class="answer-dot ${s.dotClass}"></span>
                  <span>${a.label}</span>
                </div>
                <div class="answer-response">${a.resp}</div>
                <div class="answer-why">${a.why}</div>
              </div>
            `).join('')}
            <div class="avoid-block">
              <div class="avoid-label">⚠ 避免說</div>
              <div class="avoid-text">${q.avoid}</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

// ── INIT ───────────────────────────────────────────────────
renderNav();
renderScenario();
</script>
</body>
</html>
