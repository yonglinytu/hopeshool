<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOPE 情緒六大家族｜SEL 課程地圖</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* ── 六色家族（保留原色）── */
    --yellow: #EF9F27;
    --yellow-light: #FAEEDA;
    --yellow-dark: #633806;
    --green: #639922;
    --green-light: #EAF3DE;
    --green-dark: #2a5c0a;
    --blue: #378ADD;
    --blue-light: #E6F1FB;
    --blue-dark: #042C53;
    --orange: #D85A30;
    --orange-light: #FAECE7;
    --orange-dark: #4A1B0C;
    --purple: #7F77DD;
    --purple-light: #EEEDFE;
    --purple-dark: #26215C;
    --red: #E24B4A;
    --red-light: #FCEBEB;
    --red-dark: #501313;
    --gray: #888780;
    --gray-light: #F1EFE8;
    --gray-dark: #2C2C2A;

    /* ── 奶油底色系統 ── */
    --bg:    #faf6f0;
    --bg2:   #f3ede4;
    --bg3:   #ebe3d8;
    --white: #ffffff;
    --text:  #2a2018;
    --text2: #5c4e40;
    --text3: #9a8878;
    --border:  rgba(42,32,24,0.09);
    --border2: rgba(42,32,24,0.18);
    --radius: 14px;
    --radius-sm: 9px;
    --shadow: 0 2px 8px rgba(42,32,24,0.07), 0 6px 20px rgba(42,32,24,0.06);
    --shadow-hover: 0 6px 24px rgba(42,32,24,0.13);
  }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.65;
  }

  /* ── Layout ── */
  .page { display: none; }
  .page.active { display: block; }

  /* ── Top bar ── */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(250,246,240,0.92);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 0 1.5rem;
    display: flex; align-items: center; gap: 1rem;
    height: 56px;
  }
  .topbar-logo {
    font-family: 'Noto Serif TC', serif;
    font-size: 15px; font-weight: 600; color: var(--text);
    letter-spacing: 0.02em;
  }
  .topbar-logo span { color: var(--text3); font-weight: 300; }
  .back-btn {
    display: flex; align-items: center; gap: 6px;
    background: var(--white); border: 1px solid var(--border2);
    border-radius: 20px; padding: 5px 14px; cursor: pointer;
    font-size: 13px; color: var(--text2); font-family: 'Noto Sans TC', sans-serif;
    transition: all 0.18s; box-shadow: 0 1px 4px rgba(42,32,24,0.07);
  }
  .back-btn:hover { background: var(--bg2); color: var(--text); transform: translateY(-1px); }
  .topbar-right { margin-left: auto; font-size: 12px; color: var(--text3); letter-spacing: 0.04em; }

  /* ── Home page ── */
  .home-inner { max-width: 1100px; margin: 0 auto; padding: 2.5rem 1.5rem; }

  .hero { margin-bottom: 2rem; }
  .hero h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: 28px; font-weight: 400; color: var(--text);
    letter-spacing: 0.02em; line-height: 1.35;
  }
  .hero p { font-size: 14px; color: var(--text2); margin-top: 6px; line-height: 1.75; }

  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.75rem; }
  .stat {
    background: var(--white); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 14px 16px; text-align: center;
    box-shadow: var(--shadow);
  }
  .stat-n {
    font-family: 'Noto Serif TC', serif;
    font-size: 26px; font-weight: 400; color: var(--text);
  }
  .stat-l { font-size: 11px; color: var(--text3); margin-top: 3px; letter-spacing: 0.04em; }

  .filter-section { margin-bottom: 1.5rem; }
  .filter-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 10px; }
  .filter-label { font-size: 11px; color: var(--text3); min-width: 60px; letter-spacing: 0.06em; }

  .pill {
    font-size: 12px; padding: 5px 14px; border-radius: 20px; cursor: pointer;
    border: 1px solid var(--border2); background: var(--white);
    color: var(--text2); transition: all 0.18s; user-select: none;
    font-family: 'Noto Sans TC', sans-serif;
    box-shadow: 0 1px 3px rgba(42,32,24,0.05);
  }
  .pill:hover { background: var(--bg2); transform: translateY(-1px); }
  .pill.active { font-weight: 500; border-width: 1.5px; }

  .pill-all.active    { background: var(--bg3); border-color: var(--text3); color: var(--text); }
  .pill-yellow.active { background: var(--yellow-light); border-color: var(--yellow); color: var(--yellow-dark); }
  .pill-green.active  { background: var(--green-light);  border-color: var(--green);  color: var(--green-dark); }
  .pill-blue.active   { background: var(--blue-light);   border-color: var(--blue);   color: var(--blue-dark); }
  .pill-orange.active { background: var(--orange-light); border-color: var(--orange); color: var(--orange-dark); }
  .pill-purple.active { background: var(--purple-light); border-color: var(--purple); color: var(--purple-dark); }
  .pill-red.active    { background: var(--red-light);    border-color: var(--red);    color: var(--red-dark); }
  .pill-rainbow.active { background: var(--gray-light);  border-color: var(--gray);   color: var(--gray-dark); }
  .sel-pill.active    { background: var(--bg3); border-color: var(--text2); color: var(--text); }

  /* ── Card grid ── */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 12px; }

  .card {
    background: var(--white); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 16px 16px 20px;
    cursor: pointer; transition: all 0.2s; position: relative;
    overflow: hidden; box-shadow: var(--shadow);
  }
  .card:hover { border-color: var(--border2); box-shadow: var(--shadow-hover); transform: translateY(-3px); }
  .card-accent { position: absolute; left: 0; top: 0; bottom: 0; width: 5px; }
  .card-num { font-size: 11px; color: var(--text3); margin-bottom: 6px; letter-spacing: 0.06em; }
  .card-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 14px; font-weight: 400; color: var(--text); line-height: 1.45;
  }
  .card-subtitle { font-size: 11px; color: var(--text2); margin-top: 3px; line-height: 1.5; }
  .card-meta { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 12px; }

  .badge {
    font-size: 10px; padding: 2px 9px; border-radius: 20px; font-weight: 500;
  }
  .badge-time { background: var(--bg2); color: var(--text3); border: 1px solid var(--border); }

  .family-yellow .card-accent { background: var(--yellow); }
  .family-green  .card-accent { background: var(--green); }
  .family-blue   .card-accent { background: var(--blue); }
  .family-orange .card-accent { background: var(--orange); }
  .family-purple .card-accent { background: var(--purple); }
  .family-red    .card-accent { background: var(--red); }
  .family-rainbow .card-accent { background: linear-gradient(180deg,#EF9F27 0%,#639922 30%,#378ADD 50%,#7F77DD 70%,#E24B4A 100%); }

  .sel-自我覺察     { background: #FFF3E0; color: #7B4000; border: 1px solid #EF9F27; }
  .sel-社會覺察     { background: var(--green-light);  color: var(--green-dark);  border: 1px solid var(--green); }
  .sel-自我管理     { background: var(--blue-light);   color: var(--blue-dark);   border: 1px solid var(--blue); }
  .sel-人際技巧     { background: var(--purple-light); color: var(--purple-dark); border: 1px solid var(--purple); }
  .sel-負責任的決策 { background: var(--orange-light); color: var(--orange-dark); border: 1px solid var(--orange); }

  .empty-state { grid-column: 1/-1; text-align: center; padding: 4rem; color: var(--text3); font-size: 14px; }

  /* ── Detail page ── */
  .detail-inner { max-width: 760px; margin: 0 auto; padding: 2rem 1.5rem 5rem; }

  .detail-hero {
    border-radius: var(--radius); padding: 2rem 2rem 1.75rem;
    margin-bottom: 1.5rem; position: relative; overflow: hidden;
    box-shadow: var(--shadow);
  }
  .detail-hero-stripe { position: absolute; left: 0; top: 0; bottom: 0; width: 6px; }
  .detail-family-tag {
    font-size: 12px; font-weight: 500; margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px; color: var(--text2);
  }
  .detail-num { font-size: 12px; opacity: 0.55; }
  .detail-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 26px; font-weight: 400; line-height: 1.35; letter-spacing: 0.02em;
  }
  .detail-subtitle { font-size: 15px; opacity: 0.65; margin-top: 6px; }
  .detail-meta-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; align-items: center; }
  .detail-badge { font-size: 12px; padding: 4px 13px; border-radius: 20px; font-weight: 500; }

  /* Section blocks */
  .section {
    background: var(--white); border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 12px; overflow: hidden;
    box-shadow: var(--shadow);
  }
  .section-header {
    padding: 15px 18px; display: flex; align-items: center; gap: 10px;
    cursor: pointer; user-select: none;
    border-bottom: 1px solid transparent; transition: background 0.15s;
  }
  .section-header:hover { background: var(--bg); }
  .section-header.open { border-bottom-color: var(--border); }
  .section-icon {
    width: 30px; height: 30px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0; background: var(--bg2);
  }
  .section-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 14px; font-weight: 400; color: var(--text); flex: 1;
  }
  .section-toggle { font-size: 12px; color: var(--text3); transition: transform 0.2s; }
  .section-toggle.open { transform: rotate(180deg); }
  .section-body { padding: 20px; display: none; }
  .section-body.open { display: block; }

  .steps-list { list-style: none; }
  .steps-list li {
    display: flex; gap: 12px; padding: 11px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px; line-height: 1.7; color: var(--text);
  }
  .steps-list li:last-child { border-bottom: none; padding-bottom: 0; }
  .step-num {
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--bg2); color: var(--text2);
    font-size: 11px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 2px;
  }

  .quote-block {
    background: var(--bg); border-left: 3px solid var(--border2);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 14px 18px; font-size: 14px; line-height: 1.8;
    color: var(--text2); font-style: italic;
  }

  .reminder-block {
    background: #FFFBF0; border: 1px solid #F5D87A;
    border-radius: var(--radius-sm); padding: 14px 16px;
    font-size: 14px; line-height: 1.75; color: #5C4500;
  }

  .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .action-card {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px; font-size: 13px; line-height: 1.7; color: var(--text2);
  }
  .action-card-title {
    font-size: 10px; font-weight: 600; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px;
  }

  .cards-used { display: flex; flex-wrap: wrap; gap: 6px; }
  .card-chip {
    font-size: 12px; padding: 4px 11px; border-radius: 20px;
    background: var(--bg2); border: 1px solid var(--border2); color: var(--text2);
  }

  @media (max-width: 600px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .action-grid { grid-template-columns: 1fr; }
    .grid { grid-template-columns: 1fr 1fr; }
    .detail-title { font-size: 22px; }
  }
</style>
</head>

<div id="page-home" class="page active">
  <div class="topbar">
    <div class="topbar-logo">HOPE <span>情緒六大家族</span></div>

  </div>
  <div class="home-inner">

    <div class="stats-row">
      <div class="stat"><div class="stat-n">41</div><div class="stat-l">活動總數</div></div>
      <div class="stat"><div class="stat-n">6+1</div><div class="stat-l">情緒家族</div></div>
      <div class="stat"><div class="stat-n">5</div><div class="stat-l">SEL 核心能力</div></div>

    </div>

    <div class="filter-section">
      <div class="filter-row">
        <span class="filter-label">情緒家族</span>
        <button class="pill pill-all active" data-family="all">全部</button>
        <button class="pill pill-yellow" data-family="yellow">💛 黃色</button>
        <button class="pill pill-green" data-family="green">💚 綠色</button>
        <button class="pill pill-blue" data-family="blue">💙 藍色</button>
        <button class="pill pill-orange" data-family="orange">🧡 橘色</button>

        <button class="pill pill-red" data-family="red">❤️ 紅色</button>

        <button class="pill sel-pill active" data-sel="all">全部</button>

        <button class="pill sel-pill" data-sel="社會覺察">社會覺察</button>
        <button class="pill sel-pill" data-sel="自我管理">自我管理</button>
        <button class="pill sel-pill" data-sel="人際技巧">人際技巧</button>
        <button class="pill sel-pill" data-sel="負責任的決策">負責任的決策</button>
      </div>
    </div>

    <div class="grid" id="card-grid"></div>
  </div>
</div>

<!-- ══════════════ DETAIL PAGE ══════════════ -->
<div id="page-detail" class="page">
  <div class="topbar">
    <button class="back-btn" onclick="goHome()">← 返回課程地圖</button>
    <div class="topbar-right" id="detail-topbar-info"></div>
  </div>
  <div class="detail-inner" id="detail-content"></div>
</div>

<script>
const ACTIVITIES = [
  {
    id:1, title:"安心地圖", subtitle:"找到讓我心安的地方",
    family:"yellow", familyName:"💛 黃色家族", time:10,
    sel:["自我覺察"],
    cards:"黃色家族：心安（1）、放鬆（2）、輕鬆（3）",
    goal:"擴充正向情緒詞彙，連結身體放鬆感受，練習命名「心安」情緒。",
    steps:["展示「心安」卡，請孩子用手指出現在身體哪裡感覺最放鬆。","發給每人一張紙（或學習單），畫出三個讓自己心安的地方或人。","兩兩配對，輪流分享：「當我想到＿＿，我的肩膀就放鬆了。」","全班分享一兩個，老師用「心安」卡在黑板上做情緒命名。","以陪伴句收尾：「你值得待在讓自己覺得安心、踏實的地方。」"],
    guide:"現在閉上眼睛，想一個讓你覺得很放鬆、很安全的地方——可能是你家的某個角落、奶奶家的廚房、操場的某棵樹下……感受一下那裡的溫度和聲音。",
    reminder:"若有孩子說不出來，可先示範老師自己的安心地方。不強迫分享，只需完成自己的學習單即可。",
    action_child:"今天回家後，找一個讓你覺得最安心的角落，靜靜坐 1 分鐘，感受身體哪裡放鬆了。明天可以把那個感覺用一句話或一張圖記錄下來。",
    action_teacher:"可在下次課前請 1–2 位孩子分享「安心角落」，延伸討論：這週有沒有需要讓自己平靜的時刻，你有沒有想到那個地方？也可發展為課前例行活動：「今天你的心安放在哪裡？」"
  },
  {
    id:2, title:"喜悅存摺", subtitle:"收集今天的好事",
    family:"yellow", familyName:"💛 黃色家族", time:15,
    sel:["自我覺察"],
    cards:"黃色家族：喜悅（4）、開心（5）、感恩（12）、滿足（13）",
    goal:"練習辨識喜悅、開心、感恩等正向情緒，建立感恩日記習慣。",
    steps:["展示四張卡，請孩子說說這四種感覺有什麼不同。","每人拿一張便利貼，寫下今天讓自己「心裡亮亮的」一件小事。","貼到全班「喜悅存摺」的海報上。","老師隨機抽讀幾張，問：「這件事對你來說，最像哪張情緒卡？」","以陪伴句收尾：「那種從心裡冒出來的喜悅，很值得收藏。」"],
    guide:"今天有沒有什麼小事——不一定是大事，可能是朋友對你笑、午餐很好吃、或是終於看懂一題數學——讓你心裡有一點點亮亮的感覺？",
    reminder:"海報可持續使用，每週選出班上票數最多的「本週最暖小事」，培養正向班級文化。",
    action_child:"今晚睡前，在心裡回想今天一件讓你感覺好的事，把它說給自己聽，或寫在筆記本上。連續做三天，看看你的「喜悅存摺」會變得多豐富。",
    action_teacher:"可設置班級「喜悅牆」持續累積，每隔兩週做一次回顧，讓孩子感受正向情緒的累積。也可延伸討論：喜悅可以分享嗎？分享之後喜悅會變多還是變少？"
  },
  {
    id:3, title:"給自己的獎狀", subtitle:"",
    family:"yellow", familyName:"💛 黃色家族", time:10,
    sel:["自我覺察"],
    cards:"黃色家族：得意（9）、自豪（10）、感動（11）",
    goal:"練習自我肯定，辨識「得意」與「自豪」的差別，發展成長型思維。",
    steps:["展示「得意」和「自豪」卡，討論兩者的不同：得意是今天做到的，自豪是長期努力的。","發給每人空白獎狀（可用A5紙折一下），設計獎狀並填上：我這學期（或這個星期）最努力的一件事是＿＿。","孩子分組輪流展示與分享，同組的傾聽者說一句：「我覺得你的這件事讓我感動，因為＿＿。」","收回全部的獎狀，老師整理後可以展示在公佈欄（可匿名）。","以陪伴句收尾：「你可以為自己感到自豪，不只是成績，而是你做人的方式。」"],
    guide:"現在我們不是在比誰最厲害，而是要看見自己真的有在努力的地方——可能很小，可能別人沒注意到，但你自己知道。",

  '自我管理':   { bg: '#E6F1FB', text: '#042C53', border: '#378ADD' },
  '人際技巧':   { bg: '#EEEDFE', text: '#26215C', border: '#7F77DD' },
  '負責任的決策': { bg: '#FAECE7', text: '#4A1B0C', border: '#D85A30' }
};

const SECTION_ICONS = { goal:'🎯', steps:'📋', guide:'💬', reminder:'⚠️', action:'🌱' };

let activeFamily = 'all';
let activeSel = 'all';

function renderGrid() {
  const grid = document.getElementById('card-grid');
  const filtered = ACTIVITIES.filter(a => {
    const fOk = activeFamily === 'all' || a.family === activeFamily;
    const sOk = activeSel === 'all' || a.sel.includes(activeSel);
    return fOk && sOk;
  });
  document.getElementById('showing-count').textContent = filtered.length;

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state">沒有符合條件的活動</div>';
    return;
  }

  grid.innerHTML = filtered.map(a => {
    const fc = FAMILY_COLORS[a.family];
    const selBadges = a.sel.map(s => {
      const sc = SEL_COLORS[s];
      return `<span class="badge" style="background:${sc.bg};color:${sc.text};border:1px solid ${sc.border};">${s}</span>`;
    }).join('');
    return `
      <div class="card family-${a.family}" onclick="showDetail(${a.id})">
        <div class="card-accent"></div>
        <div class="card-num">#${String(a.id).padStart(2,'0')} · ${a.familyName}</div>
        <div class="card-title">${a.title}</div>
        ${a.subtitle ? `<div class="card-subtitle">${a.subtitle}</div>` : ''}
        <div class="card-meta">
          ${selBadges}
          <span class="badge badge-time">⏱ ${a.time} 分鐘</span>
        </div>
      </div>`;
  }).join('');
}

function showDetail(id) {
  const a = ACTIVITIES.find(x => x.id === id);
  if (!a) return;
  const fc = FAMILY_COLORS[a.family];

  document.getElementById('detail-topbar-info').textContent = `#${String(a.id).padStart(2,'0')} · ${a.familyName}`;

  const selBadges = a.sel.map(s => {
    const sc = SEL_COLORS[s];
    return `<span class="detail-badge" style="background:${sc.bg};color:${sc.text};border:1px solid ${sc.border};">${s}</span>`;
  }).join('');

  const stepsHTML = a.steps.map((s, i) =>
    `<li><span class="step-num">${i+1}</span><span>${s}</span></li>`
  ).join('');

  document.getElementById('detail-content').innerHTML = `
    <div class="detail-hero" style="background:${fc.bg}; border: 1px solid ${fc.border}30;">
      <div class="detail-hero-stripe" style="background:${fc.accent};"></div>
      <div class="detail-family-tag" style="color:${fc.text};">
        <span>${a.familyName}</span>
        <span class="detail-num">· 活動 #${String(a.id).padStart(2,'0')}</span>
      </div>
      <div class="detail-title" style="color:${fc.text};">${a.title}</div>
      ${a.subtitle ? `<div class="detail-subtitle" style="color:${fc.text};">${a.subtitle}</div>` : ''}
      <div class="detail-meta-row">
        ${selBadges}
        <span class="detail-badge" style="background:rgba(0,0,0,0.06);color:${fc.text};">⏱ ${a.time} 分鐘</span>
      </div>
    </div>

    <div class="section">
      <div class="section-header open" onclick="toggleSection(this)">
        <div class="section-icon" style="background:${fc.bg};font-size:14px;">${SECTION_ICONS.goal}</div>
        <span class="section-title">活動目標</span>
        <span class="section-toggle open">▾</span>
      </div>
      <div class="section-body open" style="font-size:14px;color:var(--text2);line-height:1.75;">
        <p style="margin-bottom:10px;">${a.goal}</p>
        <div class="cards-used">
          <span style="font-size:12px;color:var(--text3);margin-right:4px;">使用牌卡：</span>
          <span style="font-size:13px;color:var(--text2);">${a.cards}</span>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-header open" onclick="toggleSection(this)">
        <div class="section-icon" style="background:${fc.bg};">${SECTION_ICONS.steps}</div>
        <span class="section-title">活動步驟</span>
        <span class="section-toggle open">▾</span>
      </div>
      <div class="section-body open">
        <ul class="steps-list">${stepsHTML}</ul>
      </div>
    </div>

    <div class="section">
      <div class="section-header open" onclick="toggleSection(this)">
        <div class="section-icon" style="background:${fc.bg};">${SECTION_ICONS.guide}</div>
        <span class="section-title">引導語建議</span>
        <span class="section-toggle open">▾</span>
      </div>
      <div class="section-body open">
        <div class="quote-block">${a.guide}</div>
      </div>
    </div>

    <div class="section">
      <div class="section-header open" onclick="toggleSection(this)">
        <div class="section-icon" style="background:${fc.bg};">${SECTION_ICONS.reminder}</div>
        <span class="section-title">老師小提醒</span>
        <span class="section-toggle open">▾</span>
      </div>
      <div class="section-body open">
        <div class="reminder-block">${a.reminder}</div>
      </div>
    </div>

    <div class="section">
      <div class="section-header open" onclick="toggleSection(this)">
        <div class="section-icon" style="background:${fc.bg};">${SECTION_ICONS.action}</div>
        <span class="section-title">行動轉化</span>
        <span class="section-toggle open">▾</span>
      </div>
      <div class="section-body open">
        <div class="action-grid">
          <div class="action-card">
            <div class="action-card-title">孩子的任務</div>
            <div>${a.action_child}</div>
          </div>
          <div class="action-card">
            <div class="action-card-title">老師的延伸</div>
            <div>${a.action_teacher}</div>
          </div>
        </div>
      </div>
    </div>
  `;

  document.getElementById('page-home').classList.remove('active');
  document.getElementById('page-detail').classList.add('active');
  window.scrollTo(0, 0);
}

function goHome() {
  document.getElementById('page-detail').classList.remove('active');
  document.getElementById('page-home').classList.add('active');
  window.scrollTo(0, 0);
}

function toggleSection(header) {
  header.classList.toggle('open');
  const toggle = header.querySelector('.section-toggle');
  const body = header.nextElementSibling;
  toggle.classList.toggle('open');
  body.classList.toggle('open');
}

document.querySelectorAll('.pill[data-family]').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('.pill[data-family]').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    activeFamily = p.dataset.family;
    renderGrid();
  });
});

document.querySelectorAll('.sel-pill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('.sel-pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    activeSel = p.dataset.sel;
    renderGrid();
  });
});

renderGrid();
</script>
</body>
</html>
